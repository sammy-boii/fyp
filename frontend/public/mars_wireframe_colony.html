
<div style="width:100%;height:580px;position:relative;border-radius:var(--border-radius-lg);overflow:hidden;background:#0d0400;">
  <canvas id="c" style="width:100%;height:100%;display:block;"></canvas>
  <div style="position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,130,60,0.35);font-family:var(--font-sans);">drag to orbit · scroll to zoom</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0400);
scene.fog = new THREE.FogExp2(0x0d0400, 0.018);

const camera = new THREE.PerspectiveCamera(58,1,0.1,300);
camera.position.set(0,8,26);
camera.lookAt(0,1,0);

function resize(){
  const w=canvas.parentElement.clientWidth, h=canvas.parentElement.clientHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize',resize);

const WC = 0xff5500; // main wireframe orange-red

// Wireframe material factory
function wmat(color, opacity=0.7){
  return new THREE.MeshBasicMaterial({color, wireframe:true, transparent:true, opacity});
}
function smat(color, opacity=0.08){
  return new THREE.MeshBasicMaterial({color, wireframe:false, transparent:true, opacity, side:THREE.DoubleSide});
}
function lmat(color, opacity=0.9){
  return new THREE.LineBasicMaterial({color, transparent:true, opacity});
}

// ── TERRAIN ──────────────────────────────────────────────────────────
const W=140, D=140, segs=110;
const geo = new THREE.PlaneGeometry(W,D,segs,segs);
geo.rotateX(-Math.PI/2);
const pos = geo.attributes.position;

function hill(x,z){
  // hills only kick in far back (z < -35)
  const fade = Math.max(0, Math.min(1, (-z-35)/28));
  const f2 = fade*fade;
  const h = (
    Math.sin(x*0.14+0.5)*Math.cos(z*0.12)*4.5
  + Math.sin(x*0.27+1.1)*Math.cos(z*0.22+0.9)*2.5
  + Math.sin(x*0.55)*Math.cos(z*0.45+0.3)*1.1
  ) * f2;
  // subtle ground texture in front
  return h + Math.sin(x*0.5)*Math.cos(z*0.5)*0.05;
}

for(let i=0;i<pos.count;i++){
  pos.setY(i, hill(pos.getX(i), pos.getZ(i)));
}
geo.computeVertexNormals();

const terrainWire = new THREE.Mesh(geo, wmat(WC, 0.45));
scene.add(terrainWire);
const terrainFill = new THREE.Mesh(geo, smat(0xff2200, 0.06));
scene.add(terrainFill);

// Helper: ground Y at colony center (approx 0 since front is flat)
function gy(x,z){ return hill(x,z); }

// ── WIREFRAME DOME ────────────────────────────────────────────────────
function addDome(x,z,r,color){
  const g = new THREE.SphereGeometry(r,20,12,0,Math.PI*2,0,Math.PI/2);
  const y = gy(x,z);
  const fill = new THREE.Mesh(g, smat(color,0.08));
  fill.position.set(x,y,z);
  scene.add(fill);
  const wire = new THREE.Mesh(g, wmat(color,0.75));
  wire.position.set(x,y,z);
  scene.add(wire);
  // base ring
  const ring = new THREE.TorusGeometry(r,0.06,6,36);
  const rm = new THREE.Mesh(ring, wmat(color,0.9));
  rm.rotation.x=Math.PI/2;
  rm.position.set(x,y+0.05,z);
  scene.add(rm);
}

// ── TUBE BUILDING ─────────────────────────────────────────────────────
function addTube(x,z,radius,length,rotY,color){
  const y = gy(x,z);
  const g = new THREE.CylinderGeometry(radius,radius,length,18,6,true);
  const fill = new THREE.Mesh(g, smat(color,0.07));
  fill.position.set(x,y+length/2,z);
  fill.rotation.y=rotY;
  scene.add(fill);
  const wire = new THREE.Mesh(g, wmat(color,0.75));
  wire.position.set(x,y+length/2,z);
  wire.rotation.y=rotY;
  scene.add(wire);
  // end caps
  [0,1].forEach(side=>{
    const cap = new THREE.CircleGeometry(radius,18);
    const cm = new THREE.Mesh(cap, wmat(color,0.6));
    cm.rotation.x = side===0 ? Math.PI/2 : -Math.PI/2;
    cm.position.set(x, y + (side===0?0:length), z);
    scene.add(cm);
  });
  // dome end on one side
  const dome = new THREE.SphereGeometry(radius,14,8,0,Math.PI*2,0,Math.PI/2);
  const dw = new THREE.Mesh(dome, wmat(color,0.6));
  dw.rotation.x = Math.PI;
  dw.position.set(x, y, z);
  scene.add(dw);
}

// ── HORIZONTAL HABITAT TUBE (lying on side) ────────────────────────
function addHorizTube(x,z,radius,length,rotY,color){
  const y = gy(x,z);
  const g = new THREE.CylinderGeometry(radius,radius,length,16,5,false);
  const fill = new THREE.Mesh(g, smat(color,0.07));
  fill.rotation.z = Math.PI/2;
  fill.rotation.y = rotY;
  fill.position.set(x, y+radius, z);
  scene.add(fill);
  const wire = new THREE.Mesh(g, wmat(color,0.72));
  wire.rotation.z = Math.PI/2;
  wire.rotation.y = rotY;
  wire.position.set(x, y+radius, z);
  scene.add(wire);
}

// ── CONNECTOR TUNNEL ──────────────────────────────────────────────────
function addTunnel(x1,z1,x2,z2,color){
  const dx=x2-x1, dz=z2-z1;
  const len=Math.sqrt(dx*dx+dz*dz);
  const cx=(x1+x2)/2, cz=(z1+z2)/2;
  const y=gy(cx,cz)+0.5;
  const g=new THREE.CylinderGeometry(0.3,0.3,len,10,3,true);
  const wire=new THREE.Mesh(g,wmat(color,0.6));
  wire.rotation.z=Math.PI/2;
  wire.rotation.y=Math.atan2(dx,dz);
  wire.position.set(cx,y,cz);
  scene.add(wire);
}

// ── BILLBOARD ─────────────────────────────────────────────────────────
function addBillboard(x,z,color){
  const y=gy(x,z);
  // two poles
  [-1.8,1.8].forEach(dx=>{
    const pg=new THREE.CylinderGeometry(0.08,0.08,6,6);
    const p=new THREE.Mesh(pg,wmat(color,0.9));
    p.position.set(x+dx,y+3,z);
    scene.add(p);
  });
  // board frame (4 edges as line segments)
  const bw=4.2, bh=2.2;
  const corners=[
    new THREE.Vector3(x-bw/2, y+4.5, z),
    new THREE.Vector3(x+bw/2, y+4.5, z),
    new THREE.Vector3(x+bw/2, y+4.5+bh, z),
    new THREE.Vector3(x-bw/2, y+4.5+bh, z),
    new THREE.Vector3(x-bw/2, y+4.5, z),
  ];
  const frameGeo = new THREE.BufferGeometry().setFromPoints(corners);
  scene.add(new THREE.Line(frameGeo, lmat(color,0.9)));
  // board fill
  const bg=new THREE.PlaneGeometry(bw,bh);
  const bf=new THREE.Mesh(bg, smat(color,0.12));
  bf.position.set(x,y+4.5+bh/2,z);
  scene.add(bf);
  // inner grid on board
  for(let i=1;i<4;i++){
    const lx=x-bw/2+i*(bw/4);
    const lg=new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(lx,y+4.5,z),
      new THREE.Vector3(lx,y+4.5+bh,z)
    ]);
    scene.add(new THREE.Line(lg,lmat(color,0.35)));
  }
  for(let i=1;i<3;i++){
    const ly=y+4.5+i*(bh/3);
    const lg=new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x-bw/2,ly,z),
      new THREE.Vector3(x+bw/2,ly,z)
    ]);
    scene.add(new THREE.Line(lg,lmat(color,0.35)));
  }
  // diagonal cross on board (X mark / logo feel)
  const d1=new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x-bw/2,y+4.5,z), new THREE.Vector3(x+bw/2,y+4.5+bh,z)
  ]);
  const d2=new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x+bw/2,y+4.5,z), new THREE.Vector3(x-bw/2,y+4.5+bh,z)
  ]);
  scene.add(new THREE.Line(d1,lmat(color,0.25)));
  scene.add(new THREE.Line(d2,lmat(color,0.25)));
  // support brace
  const brace=new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x,y,z), new THREE.Vector3(x,y+4.5,z)
  ]);
  scene.add(new THREE.Line(brace,lmat(color,0.5)));
}

// ── SOLAR PANELS (wireframe) ──────────────────────────────────────────
function addSolar(x,z,color){
  const y=gy(x,z);
  const pg=new THREE.CylinderGeometry(0.04,0.04,1.2,5);
  scene.add(new THREE.Mesh(pg,wmat(color,0.8)));
  const pm=new THREE.Mesh(pg,wmat(color,0.8));
  pm.position.set(x,y+0.6,z); scene.add(pm);
  const panG=new THREE.PlaneGeometry(1.1,0.55);
  const pan=new THREE.Mesh(panG,wmat(color,0.7));
  pan.rotation.x=-0.3;
  pan.position.set(x,y+1.35,z);
  scene.add(pan);
}

// ── ANTENNA ───────────────────────────────────────────────────────────
function addAntenna(x,z,color){
  const y=gy(x,z);
  const pg=new THREE.CylinderGeometry(0.04,0.04,3,5);
  const p=new THREE.Mesh(pg,wmat(color,0.85));
  p.position.set(x,y+1.5,z); scene.add(p);
  const dg=new THREE.CircleGeometry(0.6,14);
  const d=new THREE.Mesh(dg,wmat(color,0.65));
  d.rotation.x=Math.PI/2-0.5;
  d.position.set(x,y+3.1,z); scene.add(d);
}

// ── COLONY LAYOUT ─────────────────────────────────────────────────────
const C1 = 0xff5500, C2 = 0xff8833, C3 = 0xffaa44;

// Main central dome
addDome(0,-2,4.2,C1);
// Side domes
addDome(-5,-1.5,2.4,C2);
addDome(4.8,-1.8,2.0,C2);
addDome(-2.2,-0.5,1.4,C3);
addDome(2.4,-0.8,1.2,C3);

// Connectors
addTunnel(0,-2,-5,-1.5,C2);
addTunnel(0,-2,4.8,-1.8,C2);
addTunnel(-5,-1.5,-2.2,-0.5,C3);
addTunnel(4.8,-1.8,2.4,-0.8,C3);

// TUBE buildings (vertical)
addTube(-8.5,-1,1.0,4,0,C2);
addTube(7.5,-2,0.85,3.5,0,C2);

// Horizontal habitat tubes (large cylinders lying sideways)
addHorizTube(-8.5,2,0.9,5,0.3,C3);      // left side
addHorizTube(7.5,1.5,0.85,4.5,-0.25,C3); // right side
addHorizTube(0,5,1.0,6,0,C2);             // front tube hab

// Connect tube habs to colony
addTunnel(-8.5,-1,-5,-1.5,C3);
addTunnel(7.5,-2,4.8,-1.8,C3);

// Billboard
addBillboard(-12,0,C1);

// Solars
[-10,-9,-8].forEach((x,i)=>addSolar(x,3+i*0.3,C3));
[9,10,11].forEach((x,i)=>addSolar(x,2+i*0.3,C3));

// Antenna
addAntenna(1.5,1,C2);
addAntenna(-0.5,-5.5,C3);

// ── ORBIT CONTROLS ────────────────────────────────────────────────────
let drag=false,px=0,py=0,theta=0.05,phi=0.38,radius=26;
const target=new THREE.Vector3(0,1,0);
function updateCam(){
  camera.position.set(
    target.x+radius*Math.sin(phi)*Math.sin(theta),
    target.y+radius*Math.cos(phi),
    target.z+radius*Math.sin(phi)*Math.cos(theta)
  );
  camera.lookAt(target);
}
updateCam();
canvas.addEventListener('mousedown',e=>{drag=true;px=e.clientX;py=e.clientY;});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  theta-=(e.clientX-px)*0.006;
  phi=Math.max(0.1,Math.min(1.3,phi-(e.clientY-py)*0.006));
  px=e.clientX;py=e.clientY; updateCam();
});
canvas.addEventListener('wheel',e=>{
  radius=Math.max(6,Math.min(70,radius+e.deltaY*0.05));
  updateCam(); e.preventDefault();
},{passive:false});
let lt=null;
canvas.addEventListener('touchstart',e=>{lt=e.touches[0];});
canvas.addEventListener('touchmove',e=>{
  if(!lt)return;
  const t=e.touches[0];
  theta-=(t.clientX-lt.clientX)*0.008;
  phi=Math.max(0.1,Math.min(1.3,phi-(t.clientY-lt.clientY)*0.008));
  lt=t; updateCam(); e.preventDefault();
},{passive:false});

function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);}
animate();
})();
</script>
